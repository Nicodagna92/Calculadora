<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <main class="contenedor-principal">

        <!--Este va a ser el bloque donde va a estar la calculadora, asi es mas facil despues darle estilo en el css -->
        <section class="calculadora">

            <!-- Separamos las pantallas donde va el resultado por un lado y donde va la operacion por el otro-->
            <div class="pantalla-contenedor">
                <p class="pantalla-operacion" id="pantallaOperacion"></p>
                <h1 class="pantalla-resultado" id="pantallaResultado">0</h1>
            </div>

            <!-- En este contenedos vamos a poner todos los botones-->
            <div class="botones-contenedor">

                <!-- Vamos a usar data para no depender de textContent-->
                <button class="boton boton-funcion" id="btnClear">C</button>
                <button class="boton boton-funcion" id="btnBorrar">⌫</button>
                <button class="boton boton-funcion" id="btnSigno">+/-</button>
                <button class="boton boton-funcion" id="btnAns">ANS</button>

                <button class="boton boton-operador" data-valor="-">−</button>
                <button class="boton boton-operador" data-valor="+">+</button>
                <button class="boton boton-operador" data-valor="/">÷</button>
                <button class="boton boton-operador" data-valor="*">×</button>

                <button class="boton boton-numero" data-valor="7">7</button>
                <button class="boton boton-numero" data-valor="8">8</button>
                <button class="boton boton-numero" data-valor="9">9</button>
                <button class="boton boton-igual" id="btnIgual">=</button>


                <button class="boton boton-numero" data-valor="4">4</button>
                <button class="boton boton-numero" data-valor="5">5</button>
                <button class="boton boton-numero" data-valor="6">6</button>
                <button class="boton boton-numero" data-valor="1">1</button>
                
                <button class="boton boton-numero" data-valor="2">2</button>
                <button class="boton boton-numero" data-valor="3">3</button>
                <button class="boton boton-numero boton-cero" data-valor="0">0</button>
                <button class="boton boton-numero" data-valor=".">.</button>

            </div>

        </section>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
